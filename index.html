<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAREK POWERLIFTING</title>

<style>
body {margin:0;font-family:Arial;background:#000;color:white;text-align:center;}

.hero {
    position:relative;
    height:100vh;
    background:url('https://images.unsplash.com/photo-1599058917765-a780eda07a3e') center/cover;
}

.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

.smoke {
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://i.ibb.co/7vDLJFb/smoke.png');
    opacity:0.2;
    animation:smokeMove 20s infinite linear;
}

@keyframes smokeMove {
    0%{background-position:0 0;}
    100%{background-position:1000px 0;}
}

.logo {
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:50px;
    color:#ff3c1f;
}

.text {margin-top:-100px;padding:20px;}

.btn {
    background:#ff3c1f;
    padding:15px;
    margin:10px auto;
    width:80%;
    border-radius:30px;
    cursor:pointer;
    display:block;
    color:white;
    text-decoration:none;
}

.content {
    display:none;
    border:1px solid red;
    margin:20px;
    padding:20px;
    border-radius:20px;
    text-align:right;
}

.whatsapp {
    position:fixed;
    bottom:20px;
    left:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
}
</style>
</head>

<body>

<div class="hero">
<div class="overlay"></div>
<div class="smoke"></div>
<div class="logo">T</div>
</div>

<div class="text">

<h3>اختر الباقة المناسبة لك</h3>

<div class="btn" onclick="toggle('power')">Powerlifting - زيادة القوة</div>

<div id="power" class="content">
<h3>باقة الباورلفتينق</h3>
<p>زيادة القوة في السكوات والبنش والديدلفت</p>
</div>

<div class="btn" onclick="toggle('body')">Bodybuilding - تحسين الجسم</div>

<div id="body" class="content">
<h3>باقة البودي بلدنج</h3>
<p>بناء عضلي وخسارة دهون</p>
</div>

<a href="form.html" class="btn">🔥 سجل الآن</a>

</div>

<a href="https://wa.me/966563035411" class="whatsapp">💬</a>

<script>
function toggle(id){
let el=document.getElementById(id);
el.style.display=(el.style.display==="block")?"none":"block";
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الاشتراك</title>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;}

input,select,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
background:#ff3c1f;
color:white;
padding:15px;
border:none;
border-radius:30px;
width:80%;
}
</style>
</head>

<body>

<h2>🔥 تسجيل الاشتراك 🔥</h2>

<form action="https://formsubmit.co/YOUR-EMAIL" method="POST">

<input type="text" name="name" placeholder="اسمك" required>
<input type="number" name="weight" placeholder="وزنك">
<input type="number" name="height" placeholder="طولك">

<select name="goal">
<option>هدفك</option>
<option>زيادة القوة</option>
<option>بناء عضل</option>
<option>خسارة دهون</option>
</select>

<select name="level">
<option>مستواك</option>
<option>مبتدئ</option>
<option>متوسط</option>
<option>متقدم</option>
</select>

<textarea name="notes" placeholder="ملاحظات"></textarea>

<button type="submit">إرسال</button>

</form>

</body>
</html>
